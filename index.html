<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimePulse Ultimate</title>

<style>
html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:10;
}

.search{
text-align:center;
margin:15px;
}

.search input{
width:85%;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

/* SECTIONS */
.section{
text-align:center;
margin:10px;
}

/* TRENDING */
.trending{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.trending img{
height:130px;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:10px;
font-size:13px;
color:#ccc;
}

.release{
color:#aaa;
font-size:12px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
overflow:auto;
}

.modal-content{
background:#1c1c1c;
width:85%;
margin:50px auto;
padding:15px;
border-radius:10px;
}

.close{
float:right;
cursor:pointer;
color:red;
font-size:20px;
}

/* TOP BUTTON */
#topBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:50%;
font-size:18px;
cursor:pointer;
display:none;
}
</style>
</head>

<body>

<header>
<h2>AnimePulse 🔥 Ultimate</h2>
</header>

<div class="search">
<input type="text" id="search" onkeyup="searchAnime()" placeholder="Search anime...">
</div>

<h3 class="section" id="trending">🔥 Trending Anime</h3>
<div class="trending">
<img src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg">
<img src="https://cdn.myanimelist.net/images/anime/1441/122795.jpg">
<img src="https://cdn.myanimelist.net/images/anime/1286/99889.jpg">
<img src="https://cdn.myanimelist.net/images/anime/1806/126216.jpg">
<img src="https://cdn.myanimelist.net/images/anime/9/9453.jpg">
</div>

<h3 class="section" id="all">All Anime (50)</h3>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">❌</span>
<h2 id="title"></h2>
<img id="img" style="width:100%;border-radius:10px;">
<p id="desc"></p>
</div>
</div>

<!-- TOP BUTTON -->
<button id="topBtn" onclick="scrollToTop()">↑</button>

<script>

const anime = [

{t:"Solo Leveling",i:"https://cdn.myanimelist.net/images/anime/1938/138009.jpg",r:"Season 2 | Late 2026",d:"Weak hunter becomes strongest. S1: 2024 | S2: 2025 | S3 expected 2026"},
{t:"Blue Lock",i:"https://cdn.myanimelist.net/images/anime/1259/133638.jpg",r:"Season 2 | Late 2026",d:"Football survival game. S1: 2022 | S2: 2024"},
{t:"Jujutsu Kaisen",i:"https://cdn.myanimelist.net/images/anime/1171/109222.jpg",r:"Season 3 | Mid 2026",d:"Sorcerers vs curses. S1: 2020 | S2: 2023"},
{t:"Demon Slayer",i:"https://cdn.myanimelist.net/images/anime/1286/99889.jpg",r:"Final Arc | 2026-27",d:"Final battle arc incoming"},
{t:"Chainsaw Man",i:"https://cdn.myanimelist.net/images/anime/1806/126216.jpg",r:"Season 2 | 2026",d:"Devil hunter story"},
{t:"Death Note",i:"https://cdn.myanimelist.net/images/anime/9/9453.jpg",r:"Completed",d:"Notebook kills anyone"},
{t:"Naruto",i:"https://cdn.myanimelist.net/images/anime/13/17405.jpg",r:"Completed",d:"Ninja journey"},
{t:"One Piece",i:"https://cdn.myanimelist.net/images/anime/6/73245.jpg",r:"Ongoing",d:"Final saga ongoing"},
{t:"Bleach",i:"https://cdn.myanimelist.net/images/anime/3/40451.jpg",r:"Final Cour 2026",d:"Soul reapers war"},
{t:"Attack on Titan",i:"https://cdn.myanimelist.net/images/anime/10/47347.jpg",r:"Completed",d:"Titan war ended"},

{t:"Spy x Family",i:"https://cdn.myanimelist.net/images/anime/1441/122795.jpg",r:"Season 3 | 2026",d:"Spy family comedy"},
{t:"Tokyo Revengers",i:"https://cdn.myanimelist.net/images/anime/1839/117646.jpg",r:"Season 3 | 2026",d:"Time travel gangs"},
{t:"Hell's Paradise",i:"https://cdn.myanimelist.net/images/anime/1764/136933.jpg",r:"Season 2 | 2026",d:"Survival island"},
{t:"Haikyuu",i:"https://cdn.myanimelist.net/images/anime/7/76014.jpg",r:"Completed",d:"Volleyball anime"},
{t:"Baki",i:"https://cdn.myanimelist.net/images/anime/1935/118737.jpg",r:"Ongoing",d:"Fighting anime"},

{t:"My Hero Academia",i:"https://cdn.myanimelist.net/images/anime/10/78745.jpg",r:"Final Season",d:"Hero academy war"},
{t:"Re:Zero",i:"https://cdn.myanimelist.net/images/anime/1522/128039.jpg",r:"Season 3 2026",d:"Time loop story"},
{t:"Mushoku Tensei",i:"https://cdn.myanimelist.net/images/anime/1530/117776.jpg",r:"Season 3 2026",d:"Isekai journey"},
{t:"Classroom Elite",i:"https://cdn.myanimelist.net/images/anime/5/86848.jpg",r:"Season 3 2026",d:"Elite school game"},

{t:"Black Clover",i:"https://cdn.myanimelist.net/images/anime/2/88336.jpg",r:"2026",d:"Magic knights"},
{t:"Vinland Saga",i:"https://cdn.myanimelist.net/images/anime/1500/103005.jpg",r:"Completed",d:"Viking revenge"},
{t:"Dr Stone",i:"https://cdn.myanimelist.net/images/anime/1613/102576.jpg",r:"2026",d:"Science rebuild"},
{t:"Fairy Tail",i:"https://cdn.myanimelist.net/images/anime/5/18179.jpg",r:"Completed",d:"Magic guild"},

{t:"Overlord",i:"https://cdn.myanimelist.net/images/anime/7/88019.jpg",r:"2026",d:"Game world ruler"},
{t:"Erased",i:"https://cdn.myanimelist.net/images/anime/10/77957.jpg",r:"Completed",d:"Time mystery"},
{t:"Parasyte",i:"https://cdn.myanimelist.net/images/anime/3/73178.jpg",r:"Completed",d:"Alien parasite"},
{t:"Tokyo Ghoul",i:"https://cdn.myanimelist.net/images/anime/5/64449.jpg",r:"Completed",d:"Ghoul story"},
{t:"Akame ga Kill",i:"https://cdn.myanimelist.net/images/anime/5/64411.jpg",r:"Completed",d:"Assassins war"},

{t:"Dororo",i:"https://cdn.myanimelist.net/images/anime/1649/101692.jpg",r:"Completed",d:"Samurai demon"},
{t:"God of High School",i:"https://cdn.myanimelist.net/images/anime/1722/107269.jpg",r:"Completed",d:"Tournament fight"},
{t:"Tower of God",i:"https://cdn.myanimelist.net/images/anime/1702/106741.jpg",r:"2026",d:"Tower climbing"},
{t:"Noragami",i:"https://cdn.myanimelist.net/images/anime/1886/121800.jpg",r:"Completed",d:"God spirit"},
{t:"Fire Force",i:"https://cdn.myanimelist.net/images/anime/1660/110408.jpg",r:"Completed",d:"Fire soldiers"}

];

const grid=document.getElementById("grid");

anime.forEach((a,i)=>{
grid.innerHTML+=`
<div class="card" onclick="openModal(${i})">
<img src="${a.i}">
<div class="card-content">
<h3>${a.t}</h3>
<p class="release">${a.r}</p>
</div>
</div>
`;
});

// MODAL
function openModal(i){
document.getElementById("modal").style.display="block";
document.getElementById("title").innerText=anime[i].t;
document.getElementById("img").src=anime[i].i;
document.getElementById("desc").innerText=anime[i].d;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// SEARCH
function searchAnime(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){
let title=cards[i].getElementsByTagName("h3")[0];
cards[i].style.display=
title.innerText.toLowerCase().includes(input)?"block":"none";
}
}

// SCROLL BUTTON
window.onscroll=function(){
let btn=document.getElementById("topBtn");
if(document.documentElement.scrollTop>300){
btn.style.display="block";
}else{
btn.style.display="none";
}
};

function scrollToTop(){
window.scrollTo({top:0,behavior:"smooth"});
}

</script>

</body>
</html>
